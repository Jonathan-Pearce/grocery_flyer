name: Fetch No Frills Flyers

on:
  schedule:
    - cron: '30 13 * * 4'   # Every Thursday at 13:30 UTC (offset from Loblaws run)
  workflow_dispatch:          # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch No Frills flyers
        run: python fetch_nofrills_flyers.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nofrills/ logs/nofrills/
          git diff --cached --quiet \
            || git commit -m "chore: weekly No Frills flyer fetch $(date -u +%Y-%m-%d)"
          git push
