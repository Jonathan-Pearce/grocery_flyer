name: Fetch Walmart Flyers

on:
  schedule:
    - cron: '30 14 * * 4'  # Every Thursday at 14:30 UTC (10:30 AM ET)
  workflow_dispatch:         # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Walmart grocery flyers
        run: python fetch_walmart_flyers.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/walmart/ logs/walmart/
          git diff --cached --quiet \
            || git commit -m "chore: weekly Walmart flyer fetch $(date -u +%Y-%m-%d)"
          git push
