name: Fetch Loblaws Portfolio Flyers

on:
  schedule:
    - cron: '0 13 * * 4'  # Every Thursday at 13:00 UTC (9 AM ET)
  workflow_dispatch:        # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Loblaws portfolio flyers
        run: python fetch_loblaws_portfolio_flyers.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/loblaws/ data/nofrills/ data/provigo/ \
                  data/real_canadian_superstore/ data/maxi/ data/zehrs/ \
                  data/fortinos/ data/atlantic_superstore/ data/dominion/ \
                  data/independent_grocer/ \
                  logs/
          git diff --cached --quiet \
            || git commit -m "chore: weekly Loblaws portfolio flyer fetch $(date -u +%Y-%m-%d)"
          git push
