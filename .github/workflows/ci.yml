name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Syntax check
        run: python -m py_compile fetchers/flipp.py fetchers/azure.py scripts/fetch_flyers.py scripts/fetch_stores.py

      - name: Lint with ruff
        run: ruff check --ignore E501 .

      - name: Run tests
        run: pytest tests/ -v --tb=short
