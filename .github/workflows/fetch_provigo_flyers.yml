name: Fetch Provigo Flyers

on:
  schedule:
    - cron: '0 14 * * 4'   # Every Thursday at 14:00 UTC (offset from Loblaws/No Frills runs)
  workflow_dispatch:         # Allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Provigo flyers
        run: python fetch_provigo_flyers.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/provigo/ logs/provigo/
          git diff --cached --quiet \
            || git commit -m "chore: weekly Provigo flyer fetch $(date -u +%Y-%m-%d)"
          git push
